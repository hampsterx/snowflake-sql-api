name: Publish to PyPI

# Tag-driven release. Push a `vX.Y.Z` tag and this builds the sdist/wheel
# (version derived from the tag by hatch-vcs) and uploads to PyPI via OIDC
# trusted publishing. See RELEASING.md.
on:
  push:
    tags:
      - "v*"

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: ruff
        run: ruff check snowflake_sql_api tests
      - name: black
        run: black --check snowflake_sql_api tests
      - name: mypy
        run: mypy snowflake_sql_api

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: pytest
        # See CI: `coverage run` so tracing precedes the pytest11 plugin import.
        run: |
          coverage run -m pytest
          coverage report

  publish:
    name: Build and publish
    needs: [lint, test]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC trusted publishing; no API token needed
      contents: write # create the GitHub Release for the tag
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # hatch-vcs needs the tag (and history) to derive the version.
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build sdist and wheel
        run: python -m build
      - name: Check distribution metadata
        run: twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      - name: Create GitHub Release
        # Runs only after a successful publish. Notes are auto-generated from the
        # merged PRs since the previous tag; edit the release afterwards to add
        # highlights. Idempotent: skips if the release already exists.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; skipping."
          else
            gh release create "$tag" --verify-tag --generate-notes || {
              # Tolerate a concurrent run that created the release first.
              gh release view "$tag" >/dev/null 2>&1 \
                && echo "Release $tag was created concurrently; skipping." \
                || exit 1
            }
          fi
